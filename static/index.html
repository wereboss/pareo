<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pareo | Command Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">
        <h2>Pareo</h2>
        <ul class="nav">
            <li class="nav-item active" onclick="switchTab(event, 'utilities')">Utilities</li>
            <li class="nav-item" onclick="switchTab(event, 'tasks')">Ongoing Tasks</li>
        </ul>
    </div>
    
    <div class="main-content">
        <div id="utilities" class="tab-content active">
            <h3>Utilities</h3>
            
            <div class="card">
                <h4>Directory Listing</h4>
                <p>Execute <code>ls -ltr</code> on the host machine.</p>
                <button class="btn" onclick="executeCommand('ls')">Run Command</button>
                <span id="ls-notify" style="color: #2ecc71; margin-left: 10px; font-weight: bold; opacity: 0; transition: opacity 0.3s;">Task Queued!</span>
            </div>

            <div class="card" style="margin-top: 20px;">
                <h4>Media Processing (FFMPEG)</h4>
                <p>Convert video or audio files on the host machine.</p>
                <div style="margin-bottom: 10px;">
                    <label style="display: block; font-size: 0.85em; margin-bottom: 5px; color: #666;">Input Path</label>
                    <input type="text" id="ffmpeg-input" placeholder="/path/to/input.mp4" style="width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 4px;">
                </div>
                <div style="margin-bottom: 10px;">
                    <label style="display: block; font-size: 0.85em; margin-bottom: 5px; color: #666;">Conversion Profile</label>
                    <select id="ffmpeg-profile" style="width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 4px;">
                        <option value="Default">Loading profiles...</option>
                    </select>
                </div>                
                <div style="margin-bottom: 15px;">
                    <label style="display: block; font-size: 0.85em; margin-bottom: 5px; color: #666;">Output Path</label>
                    <input type="text" id="ffmpeg-output" placeholder="/path/to/output.mkv" style="width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 4px;">
                </div>
                <button class="btn" onclick="executeFfmpeg()">Queue FFMPEG</button>
                <span id="ffmpeg-notify" style="color: #2ecc71; margin-left: 10px; font-weight: bold; opacity: 0; transition: opacity 0.3s;">Task Queued!</span>
            </div>
        </div>

        <div id="tasks" class="tab-content">
            <h3>Ongoing Tasks</h3>
            <div class="table-container">
                <table id="tasks-table">
                    <thead>
                        <tr>
                            <th>Task ID</th>
                            <th>Command</th>
                            <th>Status</th>
                            <th>Output / Error</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
